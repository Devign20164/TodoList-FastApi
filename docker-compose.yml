# ------------------------------------------------------------------
# docker-compose.yml — DEVELOPMENT
# ------------------------------------------------------------------
# Runs both services with hot-reload for a fast dev experience.
#
# Usage:
#   docker compose up              Build and start both services
#   docker compose up --build      Rebuild after dependency changes
#   docker compose down            Stop and remove containers
#   docker compose logs -f         Follow live logs from both services
#
# Learning note — volumes:
#   The `volumes` section mounts your local code INTO the container.
#   When you edit a file on your machine, the change is instantly
#   visible inside the container — no rebuild needed. Combined with
#   uvicorn --reload, the backend auto-restarts on every save.
# ------------------------------------------------------------------

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:80,http://localhost
    volumes:
      - ./backend:/app
      - /app/venv  # Exclude the container's venv from being overwritten
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
