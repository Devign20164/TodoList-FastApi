# ------------------------------------------------------------------
# Nginx config for the React frontend container
# ------------------------------------------------------------------
# Nginx is a lightweight web server. In production, React apps don't
# need Node.js — they compile to plain HTML/CSS/JS files that any
# web server can serve. Nginx is the industry standard for this.
#
# This config does two things:
#   1. Serves the built React files (index.html, JS bundles, etc.)
#   2. Proxies API requests (/todos, /health, /docs) to the backend
#      container, so the browser only talks to one server.
# ------------------------------------------------------------------

server {
    listen 80;

    # Serve React's built files from /usr/share/nginx/html
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — forward /todos and /health requests to the backend.
    # "backend" is the service name from docker-compose.yml.
    # Docker's internal DNS resolves it to the backend container's IP.
    location /todos {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger docs proxy
    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — for any route that doesn't match a file or API path,
    # serve index.html and let React Router handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
